<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="WiPay Caribbean">
  <title>WiPay Caribbean</title>
  <!-- Background pill -->
  <rect width="200" height="60" rx="8" ry="8" fill="#005baa"/>
  <!-- "Wi" mark – stylised W -->
  <text
    x="18"
    y="42"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
    font-size="32"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1"
  >Wi</text>
  <!-- Separator dot -->
  <circle cx="72" cy="30" r="3" fill="#f9a825"/>
  <!-- "Pay" word -->
  <text
    x="82"
    y="42"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
    font-size="32"
    font-weight="700"
    fill="#f9a825"
    letter-spacing="-1"
  >Pay</text>
  <!-- Tagline -->
  <text
    x="100"
    y="56"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
    font-size="8"
    fill="#c8dff5"
    text-anchor="middle"
    letter-spacing="1"
  >CARIBBEAN PAYMENTS</text>
</svg>
